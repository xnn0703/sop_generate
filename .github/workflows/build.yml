# sop_generate · 双平台并行打包（Windows + macOS）
# ----------------------------------------------------------
# 三个 job：
#   1. prepare-release（轻量 ubuntu）：tag 触发时创建 Gitee + GitHub Release，输出 release_id
#   2. windows / macos（并行）：打包 → 7z 切片 → 上传分卷到已创建的 release
#
# 必需的 GitHub Secrets：
#   - GITEE_TOKEN
#   - RELEASE_GITEE_OWNER
#   - RELEASE_GITEE_REPO
name: build

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===================================================================
  # 准备 Release（仅 tag 触发；先创建空 release 拿到 id）
  # ===================================================================
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      gitee_release_id: ${{ steps.gitee.outputs.release_id }}
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 创建 Gitee Release
        id: gitee
        shell: bash
        run: |
          set -e
          OWNER="$RELEASE_GITEE_OWNER"
          REPO="$RELEASE_GITEE_REPO"
          TAG="${GITHUB_REF##*/}"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          # 查发版仓库默认分支
          DEFAULT_BRANCH=$(curl -s "${API}?access_token=${GITEE_TOKEN}" | python3 -c "import sys,json; print(json.load(sys.stdin)['default_branch'])")
          echo "默认分支：$DEFAULT_BRANCH"

          # 删除已存在的同名 release
          EXISTING=$(curl -s "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or '')" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "删除旧 $TAG release id=$EXISTING"
            curl -s -X DELETE "${API}/releases/${EXISTING}?access_token=${GITEE_TOKEN}"
          fi

          # 创建新 release
          SHA=$(git rev-parse --short HEAD)
          BODY=$(cat <<EOF
          稳定版本 **${TAG}** (commit ${SHA})。

          **Windows 下载**：把 sop_generate-win-${TAG}.7z.001 / .002 ... 全部下载到同一文件夹，用 7-Zip 解压 .001。
          **macOS 下载**：把 sop_generate-mac-${TAG}.7z.001 / .002 ... 全部下载到同一文件夹，用 Keka / 7-Zip 解压 .001。

          **首次启动**：
          - Windows: Defender 提示时点 "更多信息 → 仍要运行"
          - macOS: 系统设置 → 隐私与安全性 → 放行 sop_generate.app
          EOF
          )
          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
              'access_token': '${GITEE_TOKEN}',
              'tag_name': '${TAG}',
              'target_commitish': '${DEFAULT_BRANCH}',
              'name': '${TAG}',
              'body': '''$BODY''',
              'prerelease': False
          }))
          ")
          RESP=$(curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
                  -d "$PAYLOAD" "${API}/releases")
          RELEASE_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id') or '')")
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::创建 Gitee Release 失败：$RESP"
            exit 1
          fi
          echo "新 Gitee release id=$RELEASE_ID"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release（空，后续 upload 追加分卷）
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release create "$TAG" --generate-notes --title "$TAG"

  # ===================================================================
  # Windows 构建（并行）
  # ===================================================================
  windows:
    runs-on: windows-latest
    needs: [prepare-release]
    if: ${{ !cancelled() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GITEE_RELEASE_ID: ${{ needs.prepare-release.outputs.gitee_release_id }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: 注入 release.config.json
        if: env.RELEASE_GITEE_OWNER != '' && env.RELEASE_GITEE_REPO != ''
        shell: pwsh
        run: |
          $cfg = @{
            gitee_owner = $env:RELEASE_GITEE_OWNER
            gitee_repo  = $env:RELEASE_GITEE_REPO
            gitee_api   = "https://gitee.com/api/v5"
          } | ConvertTo-Json
          Set-Content -Path release.config.json -Value $cfg -Encoding UTF8

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        shell: cmd
        run: |
          if exist dist\sop_generate-win rmdir /s /q dist\sop_generate-win
          move dist\sop_generate dist\sop_generate-win
          mkdir dist\sop_generate-win\output
          xcopy /e /i /y products dist\sop_generate-win\products
          xcopy /e /i /y assets\images dist\sop_generate-win\assets\images
          (
            echo sop_generate · 作业指导书生成器
            echo ================================
            echo 双击 sop_generate.exe 启动。
            echo 首次运行 Defender 可能提示，点"更多信息" -^> "仍要运行"。
            echo 导出 PDF 需本机已装 Edge 或 Chrome。
            echo _internal\ 文件夹不可删除。
            echo 启动后会在后台检查更新，如有新版会弹窗提示。
          ) > dist\sop_generate-win\使用说明.txt

      - name: 上传 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-win
          path: dist/sop_generate-win/
          retention-days: 14

      - name: 7z 极限压缩 + 30MB 切片（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          cd dist
          # -mf=off 禁用 BCJ2 等执行过滤器，确保客户端 py7zr 能解压
          & 'C:\Program Files\7-Zip\7z.exe' a -t7z -mx=9 -mf=off -mmt=on -v30m "sop_generate-win-$tag.7z" sop_generate-win\ | Out-Null
          Get-ChildItem "sop_generate-win-$tag.7z.*" | ForEach-Object {
            Write-Host ("  {0}: {1:N1} MB" -f $_.Name, ($_.Length / 1MB))
          }

      - name: 上传 Windows 分卷到 Gitee Release（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v') && env.GITEE_TOKEN != ''
        shell: pwsh
        run: |
          $api = "https://gitee.com/api/v5/repos/$env:RELEASE_GITEE_OWNER/$env:RELEASE_GITEE_REPO"
          $rid = $env:GITEE_RELEASE_ID
          $tok = $env:GITEE_TOKEN
          $tag = '${{ github.ref_name }}'

          $parts = Get-ChildItem "dist\sop_generate-win-$tag.7z.*" | Sort-Object Name
          foreach ($p in $parts) {
            $mb = [math]::Round($p.Length / 1MB, 1)
            for ($i = 1; $i -le 3; $i++) {
              Write-Host "上传 $($p.Name) ($mb MB) 尝试 $i/3..."
              try {
                $r = Invoke-RestMethod -Uri "$api/releases/$rid/attach_files?access_token=$tok" `
                                       -Method Post -Form @{ file = $p } -TimeoutSec 3600
                Write-Host "  ✓ $($r.name)"
                break
              } catch {
                Write-Host "::warning::尝试 $i 失败：$_"
                if ($i -eq 3) { throw }
                Start-Sleep -Seconds 10
              }
            }
          }
          Write-Host "✓ Windows 分卷已挂载到 Gitee Release"

      - name: 追加 Windows 分卷到 GitHub Release（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $parts = Get-ChildItem "dist\sop_generate-win-$tag.7z.*" | Sort-Object Name
          gh release upload "$tag" ($parts.FullName) --clobber
          Write-Host "✓ Windows 分卷已追加到 GitHub Release"

  # ===================================================================
  # macOS 构建（并行）
  # ===================================================================
  macos:
    runs-on: macos-latest
    needs: [prepare-release]
    if: ${{ !cancelled() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GITEE_RELEASE_ID: ${{ needs.prepare-release.outputs.gitee_release_id }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖（p7zip）
        run: brew install p7zip

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: 注入 release.config.json
        if: env.RELEASE_GITEE_OWNER != '' && env.RELEASE_GITEE_REPO != ''
        run: |
          cat > release.config.json <<EOF
          {
            "gitee_owner": "$RELEASE_GITEE_OWNER",
            "gitee_repo": "$RELEASE_GITEE_REPO",
            "gitee_api": "https://gitee.com/api/v5"
          }
          EOF

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        run: |
          TAG="${GITHUB_REF##*/}"
          RELEASE="dist/sop_generate-mac-${TAG}"
          mkdir -p "$RELEASE/products" "$RELEASE/assets/images" "$RELEASE/output"
          mv dist/sop_generate.app "$RELEASE/"
          cp -r products/* "$RELEASE/products/" 2>/dev/null || true
          cp -r assets/images/* "$RELEASE/assets/images/" 2>/dev/null || true
          cat > "$RELEASE/使用说明.txt" <<'TXT'
          sop_generate · 作业指导书生成器
          ================================

          【启动】双击 sop_generate.app
          【首次运行】macOS 会问"无法验证开发者"，请：
              系统设置 → 隐私与安全性 → 放行 sop_generate.app
          【数据目录】products / assets/images / output 都在 .app 同级
          【导出 PDF】需装 Microsoft Edge 或 Google Chrome
          【自动更新】启动后台会检查更新，有新版弹窗提示
          TXT

      - name: 上传 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-mac
          path: dist/sop_generate-mac-*/
          retention-days: 14

      - name: 7z 极限压缩 + 30MB 切片（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF##*/}"
          cd dist
          # -mf=off 禁用 BCJ2 等执行过滤器，确保客户端 py7zr 能解压
          7z a -t7z -mx=9 -mf=off -mmt=on -v30m "sop_generate-mac-${TAG}.7z" "sop_generate-mac-${TAG}/" > /dev/null
          ls -lh "sop_generate-mac-${TAG}.7z."*

      - name: 上传 macOS 分卷到 Gitee Release（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v') && env.GITEE_TOKEN != ''
        run: |
          set -e
          TAG="${GITHUB_REF##*/}"
          API="https://gitee.com/api/v5/repos/${RELEASE_GITEE_OWNER}/${RELEASE_GITEE_REPO}"
          RID="${GITEE_RELEASE_ID}"

          for f in dist/sop_generate-mac-${TAG}.7z.*; do
            NAME=$(basename "$f")
            SIZE_MB=$(du -m "$f" | cut -f1)
            for i in 1 2 3; do
              echo "上传 $NAME (${SIZE_MB} MB) 尝试 $i/3..."
              HTTP=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
                --max-time 3600 \
                -X POST "${API}/releases/${RID}/attach_files?access_token=${GITEE_TOKEN}" \
                -F "file=@${f}")
              if [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ]; then
                echo "  ✓ $NAME"
                break
              fi
              echo "::warning::HTTP $HTTP, response: $(cat /tmp/upload_resp.json | head -c 200)"
              if [ $i -eq 3 ]; then echo "::error::$NAME 上传失败"; exit 1; fi
              sleep 10
            done
          done
          echo "✓ macOS 分卷已挂载到 Gitee Release"

      - name: 追加 macOS 分卷到 GitHub Release（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release upload "$TAG" dist/sop_generate-mac-${TAG}.7z.* --clobber
          echo "✓ macOS 分卷已追加到 GitHub Release"
