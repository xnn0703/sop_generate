# sop_generate · Windows 打包发布
# ----------------------------------------------------------
# 四个 job：
#   1. prepare-release（轻量 ubuntu）：tag 触发时创建 Gitee + GitHub Release，输出 release_id
#   2. windows：打包 → 7z 切片 → 上传分卷 Artifact
#   3. publish-release（windows）：串行上传 Windows 分卷到 Gitee + GitHub Release
#   4. finalize-release（轻量 ubuntu）：整理 Release 说明
#
# 必需的 GitHub Secrets：
#   - GITEE_TOKEN
#   - RELEASE_GITEE_OWNER
#   - RELEASE_GITEE_REPO
name: build

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===================================================================
  # 准备 Release（仅 tag 触发；先创建空 release 拿到 id）
  # ===================================================================
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      gitee_release_id: ${{ steps.gitee.outputs.release_id }}
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 创建 Gitee Release
        id: gitee
        shell: bash
        run: |
          set -e
          OWNER="$RELEASE_GITEE_OWNER"
          REPO="$RELEASE_GITEE_REPO"
          TAG="${GITHUB_REF##*/}"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          # 查发版仓库默认分支
          DEFAULT_BRANCH=$(curl -s "${API}?access_token=${GITEE_TOKEN}" | python3 -c "import sys,json; print(json.load(sys.stdin)['default_branch'])")
          echo "默认分支：$DEFAULT_BRANCH"

          # 删除已存在的同名 release
          EXISTING=$(curl -s "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or '')" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "删除旧 $TAG release id=$EXISTING"
            curl -s -X DELETE "${API}/releases/${EXISTING}?access_token=${GITEE_TOKEN}"
          fi

          # 创建新 release
          SHA=$(git rev-parse --short HEAD)
          BODY=$(cat <<EOF
          稳定版本 **${TAG}** (commit ${SHA})。

          **Windows 下载**：把 sop_generate-win-${TAG}.7z.001 / .002 ... 全部下载到同一文件夹，用 7-Zip 解压 .001。

          **首次启动**：
          - Windows: Defender 提示时点 "更多信息 → 仍要运行"
          EOF
          )
          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
              'access_token': '${GITEE_TOKEN}',
              'tag_name': '${TAG}',
              'target_commitish': '${DEFAULT_BRANCH}',
              'name': '${TAG}',
              'body': '''$BODY''',
              'prerelease': False
          }))
          ")
          RESP=$(curl -s -X POST -H "Content-Type: application/json; charset=utf-8" \
                  -d "$PAYLOAD" "${API}/releases")
          RELEASE_ID=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id') or '')")
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::创建 Gitee Release 失败：$RESP"
            exit 1
          fi
          echo "新 Gitee release id=$RELEASE_ID"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release（空，后续 upload 追加分卷）
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --generate-notes --title "$TAG"

  # ===================================================================
  # Windows 构建（并行）
  # ===================================================================
  windows:
    runs-on: windows-latest
    needs: [prepare-release]
    if: ${{ !cancelled() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GITEE_RELEASE_ID: ${{ needs.prepare-release.outputs.gitee_release_id }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: 注入 release.config.json
        if: env.RELEASE_GITEE_OWNER != '' && env.RELEASE_GITEE_REPO != ''
        shell: pwsh
        run: |
          $cfg = @{
            gitee_owner = $env:RELEASE_GITEE_OWNER
            gitee_repo  = $env:RELEASE_GITEE_REPO
            gitee_api   = "https://gitee.com/api/v5"
          } | ConvertTo-Json
          Set-Content -Path release.config.json -Value $cfg -Encoding UTF8

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        shell: cmd
        run: |
          if exist dist\sop_generate-win rmdir /s /q dist\sop_generate-win
          move dist\sop_generate dist\sop_generate-win
          mkdir dist\sop_generate-win\output
          xcopy /e /i /y sop_packages dist\sop_generate-win\sop_packages
          (
            echo sop_generate · 作业指导书生成器
            echo ================================
            echo 双击 sop_generate.exe 启动。
            echo 首次运行 Defender 可能提示，点"更多信息" -^> "仍要运行"。
            echo 导出 PDF 需本机已装 Edge 或 Chrome。
            echo _internal\ 文件夹不可删除。
            echo 启动后会在后台检查更新，如有新版会弹窗提示。
            echo.
            echo 详细操作说明：用浏览器打开 使用说明.html
          ) > dist\sop_generate-win\使用说明.txt
          copy docs\使用说明.html dist\sop_generate-win\使用说明.html
          if exist docs\images xcopy /e /i /y docs\images dist\sop_generate-win\images

      - name: 上传 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-win
          path: dist/sop_generate-win/
          retention-days: 14

      - name: 7z 极限压缩 + 30MB 切片（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          cd dist
          # -mf=off 禁用 BCJ2 等执行过滤器，确保客户端 py7zr 能解压
          & 'C:\Program Files\7-Zip\7z.exe' a -t7z -mx=9 -mf=off -mmt=on -v30m "sop_generate-win-$tag.7z" sop_generate-win\ | Out-Null
          Get-ChildItem "sop_generate-win-$tag.7z.*" | ForEach-Object {
            Write-Host ("  {0}: {1:N1} MB" -f $_.Name, ($_.Length / 1MB))
          }

      - name: 上传 Windows 发布分卷 Artifact（仅 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-parts-win
          path: dist/sop_generate-win-${{ github.ref_name }}.7z.*
          retention-days: 7

  # ===================================================================
  # 发布分卷（串行上传，避免 Gitee 并发附件上传卡住）
  # ===================================================================
  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare-release, windows]
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GITEE_RELEASE_ID:    ${{ needs.prepare-release.outputs.gitee_release_id }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 下载发布分卷 Artifact
        uses: actions/download-artifact@v4
        with:
          pattern: release-parts-win
          path: release-parts
          merge-multiple: true

      - name: 列出发布分卷
        shell: bash
        run: |
          find release-parts -type f -name '*.7z.*' -print | sort | xargs -r ls -lh

      - name: 上传分卷到 Gitee Release（串行，仅 tag）
        if: env.GITEE_TOKEN != ''
        shell: bash
        run: |
          set -u
          API="https://gitee.com/api/v5/repos/${RELEASE_GITEE_OWNER}/${RELEASE_GITEE_REPO}"
          RID="${GITEE_RELEASE_ID}"
          FAILED=0

          upload_one() {
            local f="$1"
            local name size_mb http curl_rc
            name=$(basename "$f")
            size_mb=$(du -m "$f" | cut -f1)
            for i in 1 2 3 4 5; do
              echo "上传 ${name} (${size_mb} MB) 尝试 ${i}/5..."
              http=$(curl -sS -o /tmp/upload_resp.json -w "%{http_code}" \
                --max-time 420 --connect-timeout 30 \
                --speed-time 120 --speed-limit 1024 \
                -X POST "${API}/releases/${RID}/attach_files?access_token=${GITEE_TOKEN}" \
                -F "file=@${f}")
              curl_rc=$?
              if [ "$curl_rc" = "0" ] && { [ "$http" = "201" ] || [ "$http" = "200" ]; }; then
                echo "  ✓ ${name}"
                echo "  等待 60 秒，避免 Gitee 附件接口连续上传卡住..."
                sleep 60
                return 0
              fi
              echo "::warning::${name} 尝试 ${i} 失败 (curl rc=${curl_rc} HTTP=${http}): $(cat /tmp/upload_resp.json 2>/dev/null | head -c 200)"
              sleep $((i * 15))
            done
            echo "::error::${name} 经 5 次重试仍上传失败"
            return 1
          }

          while IFS= read -r f; do
            upload_one "$f" || FAILED=1
          done < <(find release-parts -type f -name '*.7z.*' | sort)

          if [ "$FAILED" = "1" ]; then exit 1; fi
          echo "✓ 全部分卷已挂载到 Gitee Release"

      - name: 追加分卷到 GitHub Release（仅 tag）
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          mapfile -t PARTS < <(find release-parts -type f -name '*.7z.*' | sort)
          gh release upload "$TAG" "${PARTS[@]}" --clobber
          echo "✓ 全部分卷已追加到 GitHub Release"

  # ===================================================================
  # 美化 Release 描述（Windows 分卷上传后列出下载链接）
  # ===================================================================
  finalize-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare-release, publish-release]
    runs-on: ubuntu-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}
      GITEE_RELEASE_ID:    ${{ needs.prepare-release.outputs.gitee_release_id }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 清理旧 Gitee Release（保留最近 3 个版本，避免配额超限）
        shell: bash
        run: |
          set -e
          OWNER="$RELEASE_GITEE_OWNER"
          REPO="$RELEASE_GITEE_REPO"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          # 拿到所有 release（按创建时间倒序），保留最新 3 个，删除剩余
          curl -s "${API}/releases?per_page=100&access_token=${GITEE_TOKEN}" > /tmp/all_releases.json
          python3 <<'PY'
          import json, os, subprocess
          KEEP = 3
          API = f"https://gitee.com/api/v5/repos/{os.environ['RELEASE_GITEE_OWNER']}/{os.environ['RELEASE_GITEE_REPO']}"
          TOKEN = os.environ['GITEE_TOKEN']
          with open("/tmp/all_releases.json") as f:
              rels = json.load(f)
          # 按 created_at 倒序
          rels.sort(key=lambda r: r['created_at'], reverse=True)
          to_keep = rels[:KEEP]
          to_delete = rels[KEEP:]
          print(f"共 {len(rels)} 个 release，保留最新 {len(to_keep)} 个，删除 {len(to_delete)} 个")
          for r in to_keep:
              print(f"  保留: {r['tag_name']} (id={r['id']})")
          for r in to_delete:
              print(f"  删除: {r['tag_name']} (id={r['id']})")
              subprocess.run([
                  "curl", "-s", "-X", "DELETE",
                  f"{API}/releases/{r['id']}?access_token={TOKEN}"
              ], check=False)
          PY

      - name: 重新构造分组的 Release 描述 + 同步到 Gitee/GitHub
        shell: bash
        run: |
          set -e
          TAG="${GITHUB_REF##*/}"
          OWNER="$RELEASE_GITEE_OWNER"
          REPO="$RELEASE_GITEE_REPO"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"
          RID="$GITEE_RELEASE_ID"

          # 查发版仓库的 release，拿到所有 attach files
          curl -s "${API}/releases/${RID}?access_token=${GITEE_TOKEN}" > /tmp/release.json
          python3 > /tmp/body.md <<'PY'
          import json, sys
          import os
          TAG = os.environ["GITHUB_REF"].split("/")[-1]
          OWNER = os.environ["RELEASE_GITEE_OWNER"]
          REPO  = os.environ["RELEASE_GITEE_REPO"]

          with open("/tmp/release.json", "r", encoding="utf-8") as f:
              rel = json.load(f)
          assets = rel.get("assets", [])

          def fmt(a):
              # Gitee 附件下载 URL 通常在 browser_download_url；没有就拼回 path
              url = a.get("browser_download_url") or a.get("download_url") or ""
              name = a.get("name", "")
              size = a.get("size") or 0
              mb = size / 1024 / 1024
              return f"- [{name}]({url}) — {mb:.1f} MB"

          win = sorted([a for a in assets if "sop_generate-win" in a.get("name","")], key=lambda x:x["name"])

          print(f"# sop_generate {TAG}")
          print()
          print(f"> 自动构建。客户端启动会自动检查更新。本次 Release 仅提供 Windows 版本。")
          print()

          if win:
              print("## Windows 下载")
              print()
              print(f"**共 {len(win)} 个分卷**（必须全部下载到同一文件夹）：")
              print()
              for a in win: print(fmt(a))
              print()
              print("**安装步骤：**")
              print("1. 把上方所有 .7z.NNN 分卷下载到同一文件夹")
              print("2. 安装 [7-Zip](https://www.7-zip.org/)")
              print("3. 右键 `.7z.001` → 7-Zip → 解压到当前位置")
              print("4. 进入解压后目录，双击 `sop_generate.exe`")
              print("5. 首次运行 Defender 提示 → \"更多信息 → 仍要运行\"")
              print()

          print("---")
          print()
          print("> 导出 PDF 需本机已装 Microsoft Edge 或 Google Chrome（Windows 10/11 通常自带 Edge）。")
          print("> 启动后会在后台自动检查更新，有新版会弹窗提示。")
          PY
          BODY=$(cat /tmp/body.md)

          echo "===== 新的 Release Body ====="
          echo "$BODY"
          echo "============================="

          # PATCH Gitee Release body
          PAYLOAD=$(python3 -c "import json,os; print(json.dumps({'access_token': os.environ['GITEE_TOKEN'], 'body': open('/tmp/body.md').read()}))")
          curl -s -X PATCH -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" "${API}/releases/${RID}" > /dev/null
          echo "✓ Gitee Release body 已更新"

          # 同步到 GitHub Release
          gh release edit "$TAG" --notes-file /tmp/body.md
          echo "✓ GitHub Release body 已更新"
