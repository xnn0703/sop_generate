# sop_generate · 双平台自动打包（Windows + macOS）
# ----------------------------------------------------------
# 在 GitHub Actions 跑 Windows + macOS 双 runner，打 v* tag 时把分卷上传到独立
# 公开 Gitee 发版仓库（owner/repo 通过 Secrets 注入，避免源码暴露业务信息）。
#
# 必需的 GitHub Secrets：
#   - GITEE_TOKEN            : Gitee 私人令牌（projects scope）
#   - RELEASE_GITEE_OWNER    : 发版用的公开 Gitee 仓库所有者
#   - RELEASE_GITEE_REPO     : 发版用的公开 Gitee 仓库名
#
# 顺序：
#   1. windows job：构建 + 7z 分卷 + 创建 Gitee/GitHub Release + 上传 win 分卷
#   2. macos job（needs: windows）：构建 + 7z 分卷 + 追加 mac 分卷到同一 release
name: build

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===================================================================
  # Windows 构建（先跑：创建 release 并上传 win 分卷）
  # ===================================================================
  windows:
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: 注入 release.config.json（从 Secrets 取实际 owner/repo）
        if: env.RELEASE_GITEE_OWNER != '' && env.RELEASE_GITEE_REPO != ''
        shell: pwsh
        run: |
          $cfg = @{
            gitee_owner = $env:RELEASE_GITEE_OWNER
            gitee_repo  = $env:RELEASE_GITEE_REPO
            gitee_api   = "https://gitee.com/api/v5"
          } | ConvertTo-Json
          Set-Content -Path release.config.json -Value $cfg -Encoding UTF8
          Write-Host "注入后 release.config.json："
          Get-Content release.config.json

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        shell: cmd
        run: |
          if exist dist\sop_generate-win rmdir /s /q dist\sop_generate-win
          move dist\sop_generate dist\sop_generate-win
          mkdir dist\sop_generate-win\output
          xcopy /e /i /y products dist\sop_generate-win\products
          xcopy /e /i /y assets\images dist\sop_generate-win\assets\images
          (
            echo sop_generate · 作业指导书生成器
            echo ================================
            echo.
            echo 双击 sop_generate.exe 启动。
            echo 首次运行 Defender 可能提示，点"更多信息" -^> "仍要运行"。
            echo 导出 PDF 需本机已装 Edge 或 Chrome。
            echo _internal\ 文件夹不可删除。
            echo.
            echo 启动后会在后台检查更新，如有新版会弹窗提示。
          ) > dist\sop_generate-win\使用说明.txt

      - name: 上传 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-win
          path: dist/sop_generate-win/
          retention-days: 14

      - name: 7z 极限压缩 + 30MB 切片 (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          cd dist
          & 'C:\Program Files\7-Zip\7z.exe' a -t7z -mx=9 -mmt=on -v30m "sop_generate-win-$tag.7z" sop_generate-win\ | Out-Null
          $parts = Get-ChildItem "sop_generate-win-$tag.7z.*"
          Write-Host "Windows 分卷数：$($parts.Count)"
          foreach ($p in $parts) {
            Write-Host ("  {0}: {1:N1} MB" -f $p.Name, ($p.Length / 1MB))
          }

      - name: 创建 Gitee Release + 上传 Windows 分卷 (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v') && env.GITEE_TOKEN != '' && env.RELEASE_GITEE_OWNER != ''
        shell: pwsh
        run: |
          $owner = $env:RELEASE_GITEE_OWNER
          $repo  = $env:RELEASE_GITEE_REPO
          $api   = "https://gitee.com/api/v5/repos/$owner/$repo"
          $tok   = $env:GITEE_TOKEN
          $tag   = '${{ github.ref_name }}'

          # 删除已存在的同名 release
          try {
            $existing = Invoke-RestMethod -Uri "$api/releases/tags/$tag`?access_token=$tok" -Method Get -ErrorAction Stop
            Write-Host "删除旧 $tag release id=$($existing.id)"
            Invoke-RestMethod -Uri "$api/releases/$($existing.id)?access_token=$tok" -Method Delete | Out-Null
          } catch {
            Write-Host "无旧 $tag release，跳过删除"
          }

          # 创建新 release
          $sha = (git rev-parse --short HEAD).Trim()
          $bodyText = @(
            "稳定版本 **$tag** (commit $sha)。",
            "",
            "**Windows 下载**：把 sop_generate-win-$tag.7z.001 / .002 / .003 ... 全部下载到同一文件夹，用 7-Zip 解压 .001。",
            "",
            "**macOS 下载**：把 sop_generate-mac-$tag.7z.001 / .002 / .003 ... 全部下载到同一文件夹，用 7-Zip / Keka 解压 .001。",
            "",
            "**首次启动**：",
            "- Windows：Defender 提示时点 ""更多信息 → 仍要运行""",
            "- macOS：系统设置 → 隐私与安全性 → 放行 sop_generate.app",
            "",
            "> 导出 PDF 需本机已装 Edge / Chrome（macOS 也可装 Chromium）。"
          ) -join "`n"
          $payload = @{
            access_token     = $tok
            tag_name         = $tag
            target_commitish = 'main'
            name             = $tag
            body             = $bodyText
            prerelease       = $false
          } | ConvertTo-Json -Depth 3
          $release = Invoke-RestMethod -Uri "$api/releases" -Method Post -Body $payload -ContentType 'application/json; charset=utf-8'
          Write-Host "新 release id=$($release.id)"

          # 上传 Windows 分卷
          $parts = Get-ChildItem "dist\sop_generate-win-$tag.7z.*" | Sort-Object Name
          foreach ($p in $parts) {
            $mb = [math]::Round($p.Length / 1MB, 1)
            $maxRetry = 3
            for ($i = 1; $i -le $maxRetry; $i++) {
              Write-Host "上传 $($p.Name) ($mb MB)，尝试 $i/$maxRetry..."
              try {
                $r = Invoke-RestMethod -Uri "$api/releases/$($release.id)/attach_files?access_token=$tok" `
                                       -Method Post -Form @{ file = $p } -TimeoutSec 3600
                Write-Host "  ✓ $($r.name)"
                break
              } catch {
                Write-Host "::warning::尝试 $i 失败：$_"
                if ($i -eq $maxRetry) { throw }
                Start-Sleep -Seconds 10
              }
            }
          }
          Write-Host ("✓ Windows 分卷已挂载。下载页：https://gitee.com/{0}/{1}/releases/tag/{2}" -f $owner, $repo, $tag)

      - name: 创建 GitHub Release + 上传 Windows 分卷 (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $parts = Get-ChildItem "dist\sop_generate-win-$tag.7z.*" | Sort-Object Name
          gh release create $tag ($parts.FullName) --generate-notes
          Write-Host "✓ GitHub Release $tag 已发布（含 Windows 分卷）"

  # ===================================================================
  # macOS 构建（在 windows job 之后跑，追加 mac 分卷到同一 release）
  # ===================================================================
  macos:
    runs-on: macos-latest
    needs: windows
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装系统依赖（p7zip）
        run: brew install p7zip

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: 注入 release.config.json
        if: env.RELEASE_GITEE_OWNER != '' && env.RELEASE_GITEE_REPO != ''
        run: |
          cat > release.config.json <<EOF
          {
            "gitee_owner": "$RELEASE_GITEE_OWNER",
            "gitee_repo": "$RELEASE_GITEE_REPO",
            "gitee_api": "https://gitee.com/api/v5"
          }
          EOF
          cat release.config.json

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        run: |
          TAG="${GITHUB_REF##*/}"
          RELEASE="dist/sop_generate-mac-${TAG}"
          mkdir -p "$RELEASE/products" "$RELEASE/assets/images" "$RELEASE/output"
          mv dist/sop_generate.app "$RELEASE/"
          cp -r products/* "$RELEASE/products/" 2>/dev/null || true
          cp -r assets/images/* "$RELEASE/assets/images/" 2>/dev/null || true
          cat > "$RELEASE/使用说明.txt" <<'TXT'
          sop_generate · 作业指导书生成器
          ================================

          【启动】双击 sop_generate.app
          【首次运行】macOS 会问"无法验证开发者"，请：
              系统设置 → 隐私与安全性 → 放行 sop_generate.app
          【数据目录】products / assets/images / output 都在 .app 同级
          【导出 PDF】需装 Microsoft Edge 或 Google Chrome
          【自动更新】启动后台会检查更新，有新版弹窗提示
          TXT
          ls -la "$RELEASE/"

      - name: 上传 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-mac
          path: dist/sop_generate-mac-*/
          retention-days: 14

      - name: 7z 极限压缩 + 30MB 切片 (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF##*/}"
          cd dist
          # macOS 上 .app 的符号链接 / 资源 fork 需保留：用 7z 的默认即可
          7z a -t7z -mx=9 -mmt=on -v30m "sop_generate-mac-${TAG}.7z" "sop_generate-mac-${TAG}/" > /dev/null
          ls -lh "sop_generate-mac-${TAG}.7z."*
          PARTS=$(ls "sop_generate-mac-${TAG}.7z."* | wc -l)
          echo "macOS 分卷数：$PARTS"

      - name: 追加 macOS 分卷到 Gitee Release (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v') && env.GITEE_TOKEN != '' && env.RELEASE_GITEE_OWNER != ''
        run: |
          set -e
          TAG="${GITHUB_REF##*/}"
          OWNER="$RELEASE_GITEE_OWNER"
          REPO="$RELEASE_GITEE_REPO"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          # 找 release id（windows job 已创建）
          RELEASE_ID=$(curl -s -H "User-Agent: ci" "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "release id = $RELEASE_ID"

          # 上传 mac 分卷
          for f in dist/sop_generate-mac-${TAG}.7z.*; do
            NAME=$(basename "$f")
            SIZE_MB=$(du -m "$f" | cut -f1)
            for i in 1 2 3; do
              echo "上传 $NAME (${SIZE_MB} MB) 尝试 $i/3..."
              HTTP=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
                --max-time 3600 \
                -X POST "${API}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_TOKEN}" \
                -F "file=@${f}")
              if [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ]; then
                echo "  ✓ $NAME"
                break
              fi
              echo "::warning::HTTP $HTTP, response: $(cat /tmp/upload_resp.json | head -c 200)"
              if [ $i -eq 3 ]; then echo "::error::$NAME 上传失败"; exit 1; fi
              sleep 10
            done
          done
          echo "✓ macOS 分卷已挂载到 Gitee Release"
          echo "下载页：https://gitee.com/${OWNER}/${REPO}/releases/tag/${TAG}"

      - name: 追加 macOS 分卷到 GitHub Release (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release upload "$TAG" dist/sop_generate-mac-${TAG}.7z.*
          echo "✓ macOS 分卷已追加到 GitHub Release"
