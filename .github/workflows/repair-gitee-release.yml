# 手动补传 Release 分卷
#
# 用途：当主发版流程中某个 .7z.NNN 分卷上传超时失败，而 GitHub Actions
# artifact 里仍保留完整分卷时，补传缺失分卷，不重新打包、不重建 release。
name: repair-gitee-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag，例如 v1.2.3"
        required: true
        default: "v1.2.3"
      run_id:
        description: "产生 release-parts-win artifact 的 GitHub Actions run id"
        required: true
        default: "28534685925"
      part:
        description: "要补传的分卷号，例如 001；填 all 表示全部分卷"
        required: true
        default: "all"

permissions:
  actions: read
  contents: write

jobs:
  upload-missing-part:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
      RUN_ID: ${{ inputs.run_id }}
      PART: ${{ inputs.part }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO: ${{ secrets.RELEASE_GITEE_REPO }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: 下载原始 Windows 分卷 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-parts-win
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release-parts

      - name: 列出分卷
        shell: bash
        run: |
          set -e
          find release-parts -type f -name '*.7z.*' -print | sort | xargs -r ls -lh

      - name: 补传分卷到 GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          if [ "$PART" = "all" ]; then
            mapfile -t PARTS < <(find release-parts -type f -name "sop_generate-win-${TAG}.7z.*" | sort)
          else
            PARTS=("release-parts/sop_generate-win-${TAG}.7z.${PART}")
          fi
          if [ "${#PARTS[@]}" -eq 0 ]; then
            echo "::error::没有找到待补传分卷"
            exit 1
          fi
          for f in "${PARTS[@]}"; do
            test -f "$f" || { echo "::error::找不到分卷：$f"; exit 1; }
          done
          gh release upload "$TAG" "${PARTS[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          echo "✓ 分卷已补传到 GitHub Release"

      - name: 补传分卷到 Gitee Release
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GITEE_TOKEN}" ] || [ -z "${RELEASE_GITEE_OWNER}" ] || [ -z "${RELEASE_GITEE_REPO}" ]; then
            echo "::error::缺少 GITEE_TOKEN / RELEASE_GITEE_OWNER / RELEASE_GITEE_REPO secret"
            exit 1
          fi

          API="https://gitee.com/api/v5/repos/${RELEASE_GITEE_OWNER}/${RELEASE_GITEE_REPO}"
          if [ "$PART" = "all" ]; then
            mapfile -t FILES < <(find release-parts -type f -name "sop_generate-win-${TAG}.7z.*" | sort)
          else
            FILES=("release-parts/sop_generate-win-${TAG}.7z.${PART}")
          fi
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::没有找到待补传分卷"
            exit 1
          fi
          for f in "${FILES[@]}"; do
            test -f "$f" || { echo "::error::找不到分卷：$f"; exit 1; }
          done

          curl -sS "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" > /tmp/release.json
          RID="$(python3 - <<'PY'
          import json
          with open("/tmp/release.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print(data.get("id") or "")
          PY
          )"

          if [ -z "$RID" ]; then
            echo "::error::找不到 Gitee Release：${TAG}"
            head -c 500 /tmp/release.json || true
            exit 1
          fi

          upload_one() {
            local file="$1"
            local name size_mb exists http rc
            name="$(basename "$file")"
            export NAME="$name"
            exists="$(python3 - <<'PY'
          import json, os
          name = os.environ["NAME"]
          with open("/tmp/release.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print("yes" if any(a.get("name") == name for a in data.get("assets", [])) else "")
          PY
          )"
            if [ "$exists" = "yes" ]; then
              echo "✓ ${name} 已存在，无需补传"
              return 0
            fi

            size_mb="$(du -m "$file" | cut -f1)"
            for i in 1 2 3 4 5 6; do
              echo "上传 ${name} (${size_mb} MB) 尝试 ${i}/6..."
              set +e
              http="$(curl -sS -o /tmp/upload_resp.json -w "%{http_code}" \
                --connect-timeout 60 --max-time 900 \
                --retry 3 --retry-delay 10 --retry-connrefused \
                -X POST "${API}/releases/${RID}/attach_files?access_token=${GITEE_TOKEN}" \
                -F "file=@${file}")"
              rc="$?"
              set -e
              if [ "$rc" = "0" ] && { [ "$http" = "200" ] || [ "$http" = "201" ]; }; then
                echo "✓ ${name} 补传完成"
                sleep 20
                return 0
              fi
              echo "::warning::${name} 尝试 ${i} 失败 (curl rc=${rc} HTTP=${http}): $(head -c 300 /tmp/upload_resp.json 2>/dev/null || true)"
              sleep $((i * 30))
            done

            echo "::error::${name} 经多次重试仍上传失败"
            return 1
          }

          failed=0
          for f in "${FILES[@]}"; do
            upload_one "$f" || failed=1
          done

          if [ "$failed" = "1" ]; then
            exit 1
          fi
          echo "✓ 分卷已补传到 Gitee Release"
