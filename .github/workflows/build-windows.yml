# sop_generate · Windows 自动打包
# ----------------------------------------------------------
# 在 GitHub Actions 上构建 Windows 版，打 v* tag 时上传到独立的公开 Gitee
# 发版仓库（owner/repo 通过 GitHub Secrets 注入，避免源码暴露业务信息）。
#
# 必需的 GitHub Secrets（在仓库 Settings → Secrets and variables → Actions 配置）：
#   - GITEE_TOKEN            : Gitee 私人令牌（projects scope），用于推送 release
#   - RELEASE_GITEE_OWNER    : 发版用的公开 Gitee 仓库所有者（如 'your-org'）
#   - RELEASE_GITEE_REPO     : 发版用的公开 Gitee 仓库名（如 'sop_generate-releases'）
name: build-windows

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

permissions:
  contents: write     # 允许 gh release create 调 GitHub Releases API

jobs:
  build:
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      RELEASE_GITEE_OWNER: ${{ secrets.RELEASE_GITEE_OWNER }}
      RELEASE_GITEE_REPO:  ${{ secrets.RELEASE_GITEE_REPO }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: 注入 release.config.json（从 Secrets 取实际 owner/repo）
        if: env.RELEASE_GITEE_OWNER != '' && env.RELEASE_GITEE_REPO != ''
        shell: pwsh
        run: |
          $cfg = @{
            gitee_owner = $env:RELEASE_GITEE_OWNER
            gitee_repo  = $env:RELEASE_GITEE_REPO
            gitee_api   = "https://gitee.com/api/v5"
          } | ConvertTo-Json
          Set-Content -Path release.config.json -Value $cfg -Encoding UTF8
          Write-Host "注入后的 release.config.json："
          Get-Content release.config.json

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        shell: cmd
        run: |
          if exist dist\sop_generate-win rmdir /s /q dist\sop_generate-win
          move dist\sop_generate dist\sop_generate-win
          mkdir dist\sop_generate-win\output
          xcopy /e /i /y products dist\sop_generate-win\products
          xcopy /e /i /y assets\images dist\sop_generate-win\assets\images
          (
            echo sop_generate · 作业指导书生成器
            echo ================================
            echo.
            echo 双击 sop_generate.exe 启动。
            echo 首次运行 Defender 可能提示，点"更多信息" → "仍要运行"。
            echo 导出 PDF 需本机已装 Edge 或 Chrome。
            echo _internal\ 文件夹不可删除。
          ) > dist\sop_generate-win\使用说明.txt

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-win
          path: dist/sop_generate-win/
          retention-days: 14

      - name: 7z 极限压缩 + 30MB 切片
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          cd dist
          # LZMA2 极限压缩，单卷 30MB（单卷失败可单独重传，跨境上传更稳）
          & 'C:\Program Files\7-Zip\7z.exe' a -t7z -mx=9 -mmt=on -v30m sop_generate-win-latest.7z sop_generate-win\ | Out-Null
          $parts = Get-ChildItem sop_generate-win-latest.7z.*
          Write-Host "分卷数：$($parts.Count)"
          $total = 0
          foreach ($p in $parts) {
            $mb = [math]::Round($p.Length / 1MB, 1)
            Write-Host "  $($p.Name): $mb MB"
            $total += $p.Length
          }
          Write-Host "压缩总大小：$([math]::Round($total / 1MB, 1)) MB"

      - name: 同步到 Gitee Release (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v') && env.GITEE_TOKEN != '' && env.RELEASE_GITEE_OWNER != ''
        shell: pwsh
        run: |
          $owner = $env:RELEASE_GITEE_OWNER
          $repo  = $env:RELEASE_GITEE_REPO
          $api   = "https://gitee.com/api/v5/repos/$owner/$repo"
          $tok   = $env:GITEE_TOKEN

          $tag = '${{ github.ref_name }}'

          # 删除已存在的同名 release（重跑同 tag 时）
          try {
            $existing = Invoke-RestMethod -Uri "$api/releases/tags/$tag`?access_token=$tok" -Method Get -ErrorAction Stop
            Write-Host "删除旧 $tag release id=$($existing.id)"
            Invoke-RestMethod -Uri "$api/releases/$($existing.id)?access_token=$tok" -Method Delete | Out-Null
          } catch {
            Write-Host "无旧 $tag release，跳过删除"
          }

          # 创建新 release
          $sha = (git rev-parse --short HEAD).Trim()
          $bodyText = @(
            "稳定版本 **$tag** (commit $sha)。",
            "",
            "**下载说明：**",
            "1. 把所有 sop_generate-win-$tag.7z.001 / .002 / .003 ... 全部下载到同一文件夹",
            "2. 安装 7-Zip：https://www.7-zip.org/",
            "3. 选中 .001 文件 → 右键 → 7-Zip → 解压到当前位置",
            "4. 进入解压后的目录，双击 sop_generate.exe 启动",
            "",
            "> 导出 PDF 需本机已装 Microsoft Edge 或 Google Chrome（Win10/11 自带 Edge）。"
          ) -join "`n"
          $payload = @{
            access_token     = $tok
            tag_name         = $tag
            target_commitish = 'main'
            name             = $tag
            body             = $bodyText
            prerelease       = $false
          } | ConvertTo-Json -Depth 3
          $release = Invoke-RestMethod -Uri "$api/releases" -Method Post -Body $payload -ContentType 'application/json; charset=utf-8'
          Write-Host "新 release id=$($release.id)"

          # 按顺序上传所有分卷（重命名为含 tag 的文件名）
          $parts = Get-ChildItem dist\sop_generate-win-latest.7z.* | Sort-Object Name
          foreach ($p in $parts) {
            $newName = $p.Name -replace 'sop_generate-win-latest', "sop_generate-win-$tag"
            $newPath = Join-Path $p.Directory.FullName $newName
            Rename-Item $p.FullName $newPath
            $newFile = Get-Item $newPath
            $mb = [math]::Round($newFile.Length / 1MB, 1)

            # 跨境上传：超时 3600s + 最多重试 3 次
            $maxRetry = 3
            for ($i = 1; $i -le $maxRetry; $i++) {
              Write-Host "上传 $($newFile.Name) ($mb MB)，尝试 $i/$maxRetry..."
              try {
                $r = Invoke-RestMethod -Uri "$api/releases/$($release.id)/attach_files?access_token=$tok" `
                                       -Method Post -Form @{ file = $newFile } -TimeoutSec 3600
                Write-Host "  ✓ $($r.name)"
                break
              } catch {
                Write-Host "::warning::尝试 $i 失败：$_"
                if ($i -eq $maxRetry) {
                  Write-Host "::error::上传 $($newFile.Name) 经 $maxRetry 次重试仍失败"
                  throw
                }
                Start-Sleep -Seconds 10
              }
            }
          }
          Write-Host "✓ 全部分卷已挂载到 Gitee Release"
          Write-Host ("下载页：https://gitee.com/{0}/{1}/releases/tag/{2}" -f $owner, $repo, $tag)

      - name: 创建 GitHub Release (仅 tag 触发)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          # 此时分卷已被前一步重命名为 sop_generate-win-<tag>.7z.NNN
          $parts = Get-ChildItem dist\sop_generate-win-$tag.7z.* | Sort-Object Name
          gh release create $tag ($parts.FullName) --generate-notes
          Write-Host "✓ GitHub Release $tag 已发布"
