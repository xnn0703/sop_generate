# sop_generate · Windows 自动打包
# ----------------------------------------------------------
# 备用工作流：当代码被镜像/推送到 GitHub 时，自动在
# windows-latest runner 上跑 PyInstaller，产出 sop_generate-win/。
#
# 当前主仓在 Gitee (https://gitee.com/soft-hertz/sop_generate)，
# 本文件仅在你后续把仓库镜像到 GitHub 后才会生效。
#
# 使用方式：
#   1) 把当前仓库镜像（或 fork）到 GitHub
#   2) 在 GitHub 仓库页 → Actions 标签 → 启用工作流
#   3) push 到 main 即触发；或在 Actions 页手动 run
#   4) 构建完成在该次 run 的 "Artifacts" 区下载 sop_generate-win.zip
name: build-windows

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r packaging/requirements-build.txt

      - name: PyInstaller 打包
        run: pyinstaller packaging/build.spec --clean --noconfirm

      - name: 整理发布目录
        shell: cmd
        run: |
          if exist dist\sop_generate-win rmdir /s /q dist\sop_generate-win
          move dist\sop_generate dist\sop_generate-win
          mkdir dist\sop_generate-win\output
          xcopy /e /i /y products dist\sop_generate-win\products
          xcopy /e /i /y assets\images dist\sop_generate-win\assets\images
          (
            echo sop_generate · 作业指导书生成器
            echo ================================
            echo.
            echo 双击 sop_generate.exe 启动。
            echo 首次运行 Defender 可能提示，点"更多信息" → "仍要运行"。
            echo 导出 PDF 需本机已装 Edge 或 Chrome。
            echo _internal\ 文件夹不可删除。
          ) > dist\sop_generate-win\使用说明.txt

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: sop_generate-win
          path: dist/sop_generate-win/
          retention-days: 14

      - name: 7z 极限压缩 + 80MB 切片
        shell: pwsh
        run: |
          cd dist
          # LZMA2 极限压缩，单卷 80MB（确保单文件 < Gitee 100MB 限制）
          & 'C:\Program Files\7-Zip\7z.exe' a -t7z -mx=9 -mmt=on -v80m sop_generate-win-latest.7z sop_generate-win\ | Out-Null
          $parts = Get-ChildItem sop_generate-win-latest.7z.*
          Write-Host "分卷数：$($parts.Count)"
          $total = 0
          foreach ($p in $parts) {
            $mb = [math]::Round($p.Length / 1MB, 1)
            Write-Host "  $($p.Name): $mb MB"
            $total += $p.Length
          }
          Write-Host "压缩总大小：$([math]::Round($total / 1MB, 1)) MB"

      - name: 同步到 Gitee Release (latest)
        if: github.ref == 'refs/heads/main' && env.GITEE_TOKEN != ''
        shell: pwsh
        run: |
          $owner = 'soft-hertz'
          $repo  = 'sop_generate'
          $api   = "https://gitee.com/api/v5/repos/$owner/$repo"
          $tok   = $env:GITEE_TOKEN

          # 删除旧 latest release
          try {
            $existing = Invoke-RestMethod -Uri "$api/releases/tags/latest?access_token=$tok" -Method Get -ErrorAction Stop
            Write-Host "删除旧 latest release id=$($existing.id)"
            Invoke-RestMethod -Uri "$api/releases/$($existing.id)?access_token=$tok" -Method Delete | Out-Null
          } catch {
            Write-Host "无旧 latest release，跳过删除"
          }

          # 创建新 release
          $sha = (git rev-parse --short HEAD).Trim()
          $bodyText = @(
            "自动构建 (commit $sha)。",
            "",
            "**下载说明：**",
            "1. 把所有 sop_generate-win-latest.7z.001 / .002 / .003 ... 全部下载到同一文件夹",
            "2. 安装 7-Zip：https://www.7-zip.org/",
            "3. 选中 .001 文件 → 右键 → 7-Zip → 解压到当前位置",
            "4. 进入解压后的目录，双击 sop_generate.exe 启动",
            "",
            "> 导出 PDF 需本机已装 Microsoft Edge 或 Google Chrome（Win10/11 自带 Edge）。"
          ) -join "`n"
          $payload = @{
            access_token     = $tok
            tag_name         = 'latest'
            target_commitish = 'main'
            name             = "最新构建 ($sha)"
            body             = $bodyText
            prerelease       = $false
          } | ConvertTo-Json -Depth 3
          $release = Invoke-RestMethod -Uri "$api/releases" -Method Post -Body $payload -ContentType 'application/json; charset=utf-8'
          Write-Host "新 release id=$($release.id)"

          # 按顺序上传所有分卷
          $parts = Get-ChildItem dist\sop_generate-win-latest.7z.* | Sort-Object Name
          foreach ($p in $parts) {
            $mb = [math]::Round($p.Length / 1MB, 1)
            Write-Host "上传 $($p.Name) ($mb MB)..."
            try {
              $r = Invoke-RestMethod -Uri "$api/releases/$($release.id)/attach_files?access_token=$tok" `
                                     -Method Post -Form @{ file = $p } -TimeoutSec 600
              Write-Host "  ✓ $($r.name)"
            } catch {
              Write-Host "::error::上传 $($p.Name) 失败：$_"
              throw
            }
          }
          Write-Host "✓ 全部分卷已挂载到 Gitee Release"
          Write-Host "下载页：https://gitee.com/$owner/$repo/releases/tag/latest"

      - name: 创建稳定版 Release（GitHub + Gitee，仅 v* tag 触发）
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.ref_name }}'
          $parts = Get-ChildItem dist\sop_generate-win-latest.7z.* | Sort-Object Name

          # GitHub Release（一次性传所有分卷）
          gh release create $tag ($parts.FullName) --generate-notes

          # Gitee Release（如果配置了 token）
          if ($env:GITEE_TOKEN) {
            $owner = 'soft-hertz'; $repo = 'sop_generate'
            $api = "https://gitee.com/api/v5/repos/$owner/$repo"
            $body = "稳定版本 $tag。`n`n下载所有 .7z.NNN 分卷到同一文件夹，用 7-Zip 解压 .001 即可。`n双击 sop_generate.exe 启动。"
            $payload = @{
              access_token     = $env:GITEE_TOKEN
              tag_name         = $tag
              target_commitish = 'main'
              name             = $tag
              body             = $body
              prerelease       = $false
            } | ConvertTo-Json
            $release = Invoke-RestMethod -Uri "$api/releases" -Method Post -Body $payload -ContentType 'application/json; charset=utf-8'
            foreach ($p in $parts) {
              Invoke-RestMethod -Uri "$api/releases/$($release.id)/attach_files?access_token=$($env:GITEE_TOKEN)" `
                                -Method Post -Form @{ file = $p } -TimeoutSec 600 | Out-Null
              Write-Host "  ✓ $($p.Name)"
            }
            Write-Host "✓ Gitee Release $tag 已发布"
          }
