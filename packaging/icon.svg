<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 圆角方形渐变背景：绿（公司）→ 蓝（作业指导书） -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#339966"/>
      <stop offset="100%" stop-color="#1846b0"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0b1f3a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- 主文档（带翻角） -->
  <g filter="url(#shadow)">
    <path d="M 260 200
             L 700 200
             L 820 320
             L 820 880
             Q 820 920 780 920
             L 260 920
             Q 220 920 220 880
             L 220 240
             Q 220 200 260 200 Z"
          fill="url(#paper)"/>
    <!-- 翻角阴影 -->
    <path d="M 700 200 L 820 320 L 700 320 Z" fill="#d4d8e0"/>
    <path d="M 700 200 L 820 320 L 700 320 Z" fill="none" stroke="#a8b0bc" stroke-width="4"/>
  </g>

  <!-- 文档标题条（蓝色——呼应"作业指导书"标题色） -->
  <rect x="280" y="360" width="500" height="44" rx="10" fill="#1846b0"/>

  <!-- 文档正文线条 -->
  <g fill="none" stroke="#8a93a2" stroke-width="14" stroke-linecap="round">
    <line x1="280" y1="468" x2="780" y2="468"/>
    <line x1="280" y1="528" x2="720" y2="528"/>
    <line x1="280" y1="588" x2="780" y2="588"/>
    <line x1="280" y1="648" x2="660" y2="648"/>
  </g>

  <!-- 校验/已完成 角标（绿色对勾，代表"已生成、合规"） -->
  <g transform="translate(710 700)">
    <circle r="118" fill="#22c55e"/>
    <circle r="118" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.5"/>
    <path d="M -52 4 L -14 44 L 56 -38"
          fill="none" stroke="#ffffff" stroke-width="28"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 工艺齿轮（左上角，象征"工艺/工序"） -->
  <g transform="translate(330 300)" fill="#1846b0">
    <!-- 齿牙（8 颗）-->
    <g>
      <rect x="-12" y="-86" width="24" height="32" rx="4"/>
      <rect x="-12" y="54"  width="24" height="32" rx="4"/>
      <rect x="-86" y="-12" width="32" height="24" rx="4"/>
      <rect x="54"  y="-12" width="32" height="24" rx="4"/>
      <g transform="rotate(45)">
        <rect x="-12" y="-86" width="24" height="32" rx="4"/>
        <rect x="-12" y="54"  width="24" height="32" rx="4"/>
        <rect x="-86" y="-12" width="32" height="24" rx="4"/>
        <rect x="54"  y="-12" width="32" height="24" rx="4"/>
      </g>
    </g>
    <circle r="56"/>
    <circle r="24" fill="#ffffff"/>
  </g>

  <!-- 底部 SOP 文字（白色，半透明，象征文档定位） -->
  <text x="512" y="996" text-anchor="middle"
        font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif"
        font-size="68" font-weight="700" fill="#ffffff" opacity="0.85"
        letter-spacing="14">SOP</text>
</svg>
