# =============================================================
# sop_generate · YAML 字段规范（v1.1.0+）
# =============================================================
# 实际产品在 sop_packages/<MODEL>/product.yaml
# 每个 SOP 工程包目录结构：
#   sop_packages/<MODEL>/
#   ├── product.yaml
#   ├── images/
#   └── output/

# -------- 字段规范（v1.2.0 起支持多级工序、图片手动布局、草稿导出） --------
# product.model:            必填，仅禁文件系统不允许字符
# product.name:             必填
# product.company:          必填
# product.doc_id:           必填
# product.version:          必填，形如 A/0、B/1
# product.publish_date:     必填，YYYY-M-D
# product.effective_date:   必填，YYYY-M-D
# product._meta:            自动维护（created_by/at, last_modified_by/at）
#
# processes:                必填，1+ 项；流程图按一级工序组自动分页
#   - name:                 必填
#     level:                可选，1/2/3；旧工程缺省为 1
#     key:                  布尔，true 标记关键工序（★）
#     work_time_min:        可选，分钟数字；导出显示为 45min / 1h / 1h15min
#     operations:           可空，单页 6 条；超出自动分页
#     notes:                可选，单页 4 条；超出自动分页
#     images:               可选，单页 4 张；旧写法为文件名，新写法可带 layout
#       layout:             手动图片布局，百分比坐标；rotation 可选 0/90/180/270
#     tools:                可选，单页 4 项；超出自动分页
#     materials:            可选，单页 4 项；超出自动分页
#     _meta:                自动维护

# -------- 示例 --------
example:
  product:
    model: DEMO01
    name: 演示产品
    company: 公司名称
    doc_id: DOC-XX-001
    version: A/0
    publish_date: 2026-1-1
    effective_date: 2026-1-15

  processes:
    - name: 示例一级工序
      level: 1
      key: true
      work_time_min: 75
      operations:
        - 第一步：取一个零件
        - 第二步：装到对应位置
      notes:
        - 注意佩戴防静电手环
      images:
        - 示例工序.png
        - file: 示例工序局部.png
          layout: {x: 52, y: 0, w: 48, h: 48, rotation: 90}
      tools:
        - 螺丝刀
      materials:
        - M3×6 螺钉
    - name: 示例二级工序
      level: 2
      key: false
      work_time_min: 30
      operations: []
      notes: []
      images: []
      tools: []
      materials: []
