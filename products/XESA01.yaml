# XESA01 射频终端作业指导书
# 字段说明见 products/_schema.yaml

product:
  model: XESA01
  name: 射频终端
  company: 南京软赫电子科技有限公司
  doc_id: SH-ZY-04
  version: A/0
  publish_date: 2026-3-30
  effective_date: 2026-4-1

processes:
  - name: 安装硅胶O型圈
    key: false
    operations:
      - 用镊子取一根硅胶O型圈
      - 将O型圈安装到对应壳体凹槽中，注意安装到位，不可扭曲、拉伸
    notes:
      - O型圈安装前须清洁凹槽，无毛刺、无异物
      - 安装后目视检查O型圈无扭曲、无外露、无破损
    images:
      - 安装硅胶O型圈.png
    tools:
      - 不锈钢镊子
      - 防静电手环
    materials:
      - 硅胶O型圈
      - 无尘布
      - 酒精

  - name: 安装固定内部主结构件
    key: false
    operations:
      - 将主结构件放入腔体内对应位置
      - 使用 M3×8 螺钉点胶固定主结构件
      - 用 M2×5 螺钉固定 SMA-SMP 连接线
      - 底部用 M4×10 螺钉点胶固定
    notes:
      - 螺钉点胶量适中，避免溢胶污染射频元件
      - SMA-SMP 连接线走线避免压伤，连接到位不可虚接
      - 螺钉对角交叉紧固，扭力一致
    images:
      - 安装固定内部主结构件1.png
      - 安装固定内部主结构件2.png
    tools:
      - 内六角螺丝刀
      - 点胶笔
      - 扭力扳手
    materials:
      - 主结构件
      - M3×8 螺钉
      - M2×5 螺钉
      - M4×10 螺钉、螺纹胶

  - name: 安装防水接头
    key: false
    operations:
      - 将金属防水接头 M8-L10 安装到壳体对应孔位
      - 用内六角螺丝刀点胶紧固
      - 连接风扇电源线至防水接头内侧
    notes:
      - 接头安装后须在腔体内部接头与腔体缝隙处填补硅胶，增强密封性
      - 紧固后检查无松动、无漏胶
    images:
      - 安装防水接头.png
    tools:
      - 内六角螺丝刀
      - 密封硅胶枪
    materials:
      - 防水接头 M8-L10
      - 密封硅胶
      - 螺纹胶

  - name: 安装RX接收模块
    key: true
    operations:
      - 佩戴防静电手环
      - 将 RX 接收模块对位放入安装腔体
      - 使用 M3×8 内六角螺钉点胶固定四角
    notes:
      - 关键工序，必须佩戴防静电手环、使用防静电台垫
      - 模块插针对位准确，禁止暴力推入
      - 四角螺钉对角交叉紧固，扭力一致
    images:
      - 安装RX接收模块.png
    tools:
      - 内六角螺丝刀
      - 防静电手环
      - 防静电台垫
    materials:
      - RX 接收模块
      - M3×8 螺钉
      - 螺纹胶

  - name: 安装风扇
    key: false
    operations:
      - 确认风扇风向标识朝下
      - 将风扇放置在指定支架位置
      - 用 M4×10 内六角螺钉点胶固定风扇四角
    notes:
      - 风向必须与机箱散热方向一致（朝下）
      - 风扇电源线整理走线，避免触碰扇叶
    images:
      - 安装风扇.png
    tools:
      - 内六角螺丝刀
      - 扎线带
    materials:
      - 风扇
      - M4×10 螺钉
      - 螺纹胶

  - name: 安装J30J接口
    key: false
    operations:
      - J30J 接口由内向外穿入壳体安装孔
      - 外侧使用 M2×6 螺母锁紧
      - 再用 M2×9 螺钉固定法兰
    notes:
      - J30J 接口针脚不可碰伤、变形
      - 法兰螺钉对称紧固，扭力一致
    images:
      - 安装J30J接口.png
    tools:
      - 内六角螺丝刀
      - 套筒扳手 M2
    materials:
      - J30J 接口
      - M2×6 螺母
      - M2×9 螺钉
      - 螺纹胶

  - name: 安装交换机及MCU板
    key: true
    operations:
      - 用镊子将交换机模块放置到指定位置
      - 用 M3×6 内六角螺钉点胶固定交换机
      - 再将 MCU 板对位安装到交换机上方
      - 用 M2.5×5 内六角螺钉点胶固定 MCU 板
    notes:
      - 关键工序，全程佩戴防静电手环
      - MCU 板与交换机连接器对位准确，无偏插
      - 螺钉对角交叉紧固，禁止超扭
    images:
      - 安装交换机及MCU板.png
    tools:
      - 内六角螺丝刀
      - 不锈钢镊子
      - 防静电手环
      - 防静电台垫
    materials:
      - 交换机、MCU板
      - M3×6 螺钉
      - M2.5×5 螺钉
      - 螺纹胶

  - name: 安装485网口转换器
    key: false
    operations:
      - 将 485 网口转换器对位放入安装腔
      - 用 M3×6 内六角螺钉点胶固定转换器四角
      - 连接转换器线缆至对应接口
    notes:
      - 线缆连接前确认 RJ45 / 485 接口对应关系，避免错插
      - 转换器螺钉对角紧固，扭力一致
    images:
      - 安装485网口转换器.png
    tools:
      - 内六角螺丝刀
      - 剥线钳
      - 网线测试仪
    materials:
      - 485 网口转换器
      - M3×6 螺钉
      - 螺纹胶
